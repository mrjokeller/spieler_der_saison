<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VfBSTR - Spieler der Saison</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js"></script>
    <script src="js/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <header class="sticky-header">
        <div class="header-content">
            <div id="home">
                <a href="https://mrjokeller.github.io/spieler_der_saison">
                    <h1>VfBSTR - Spieler der Saison</h1>
                </a>
            </div>
            <!-- <nav class="navbar">
                <ul>
                    <li><a href="#">Gesamtplatzierung</a></li>
                    <li><a href="#">Entwicklung</a></li>
                    <li><a href="#">Statistiken</a></li>
                    <li><a href="#">Siegerliste</a></li>
                </ul>
            </nav> -->
        </div>
    </header>
    <div class="ranking-container">
        <div class="tab-group">
            <button class="tab-button active" data-tab="total">Gesamtplatzierung</button>
            <button class="tab-button" data-tab="community">Community</button>
            <button class="tab-button" data-tab="riky">Riky</button>
            <button class="tab-button" data-tab="sebastian">Sebastian</button>
        </div>

        <div class="tab-content active" id="total">
            <table class="ranking-table" id="total-ranking">
                <thead>
                    <tr>
                        <th>Platz</th>
                        <th>Spieler</th>
                        <th>Spiele</th>
                        <th>Minuten</th>
                        <th>Punkte/90min</th>
                        <th>Punkte</th>
                    </tr>
                </thead>
                <tbody id="ranking-body-total"></tbody>
            </table>
        </div>

        <div class="tab-content" id="community" style="display: none;">
            <table class="ranking-table" id="community-ranking">
                <thead>
                    <tr>
                        <th>Platz</th>
                        <th>Spieler</th>
                        <th>Spiele</th>
                        <th>Minuten</th>
                        <th>Punkte/90min</th>
                        <th>Punkte</th>
                    </tr>
                </thead>
                <tbody id="ranking-body-community"></tbody>
            </table>
        </div>

        <div class="tab-content" id="riky" style="display: none;">
            <table class="ranking-table" id="riky-ranking">
                <thead>
                    <tr>
                        <th>Platz</th>
                        <th>Spieler</th>
                        <th>Spiele</th>
                        <th>Minuten</th>
                        <th>Punkte/90min</th>
                        <th>Punkte</th>
                    </tr>
                </thead>
                <tbody id="ranking-body-riky"></tbody>
            </table>
        </div>

        <div class="tab-content" id="sebastian" style="display: none;">
            <table class="ranking-table" id="sebastian-ranking">
                <thead>
                    <tr>
                        <th>Platz</th>
                        <th>Spieler</th>
                        <th>Spiele</th>
                        <th>Minuten</th>
                        <th>Punkte/90min</th>
                        <th>Punkte</th>
                    </tr>
                </thead>
                <tbody id="ranking-body-sebastian"></tbody>
            </table>
        </div>
    </div>
    <!-- <div class="chart">
        <canvas id="line-chart"></canvas>
    </div> -->
    <footer class="footer" style="text-align: center; margin: 32px;">
        <a href="https://github.com/mrjokeller/spieler_der_saison">GitHub</a>
    </footer>
</body>

</html>
